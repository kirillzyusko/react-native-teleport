appId: teleport.example
---
# Web is skipped for now because Maestro does not expose a press/move/release
# pointer API there yet; `swipe` scrolls the page instead of moving a pointer.
# Re-enable when https://github.com/mobile-dev-inc/Maestro/pull/2978 lands.
- runFlow:
    when:
      true: ${maestro.platform == 'ios' || maestro.platform == 'android'}
    commands:
      - launchApp
      - waitForAnimationToEnd
      - tapOn:
          id: "teleportation_order"
      - assertVisible:
          text: "Open First Dialog"
      - tapOn:
          text: "Open First Dialog"
      - assertVisible:
          text: "First Dialog"
      - swipe:
          label: "Press, move right, hold, and release Close First Dialog"
          start: 45%, 59%
          end: 55%, 59%
          duration: 3000
      - assertNotVisible:
          text: "First Dialog"
