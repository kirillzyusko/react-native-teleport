appId: teleport.example
---
- launchApp
- waitForAnimationToEnd
- tapOn:
    id: "teleportation_order"
- assertVisible:
    text: "Open First Dialog"
- tapOn:
    text: "Open First Dialog"
- assertVisible:
    text: "First Dialog"
- tapOn:
    text: "Open Second Dialog"
- assertVisible:
    text: "Second Dialog"
- tapOn:
    text: "Open Third Dialog"
- assertVisible:
    text: "Third Dialog"
- tapOn:
    text: "Close Third Dialog"
- assertVisible:
    text: "Second Dialog"
- assertNotVisible:
    text: "Third Dialog"
- tapOn:
    text: "Close Second Dialog"
- assertVisible:
    text: "First Dialog"
- assertNotVisible:
    text: "Second Dialog"
- assertNotVisible:
    text: "Third Dialog"
- tapOn:
    text: "Close First Dialog"
- assertNotVisible:
    text: "First Dialog"
- assertNotVisible:
    text: "Second Dialog"
- assertNotVisible:
    text: "Third Dialog"

# on web swipe moves a whole window, and it't not a mouse move
# can be rewritten when https://github.com/mobile-dev-inc/Maestro/pull/2978
# is getting merged
- runFlow:
    label: "Android press-move-release"
    when:
      platform: Android
    file: ../subflows/teleportation-order-press-move-release.yml

- runFlow:
    label: "iOS press-move-release"
    when:
      platform: iOS
    file: ../subflows/teleportation-order-press-move-release.yml
