appId: teleport.example
---
- launchApp
- waitForAnimationToEnd
- runFlow:
    file: ../subflows/open-example.yml
    env:
      EXAMPLE_ID: "bottom_sheet"
- assertNotVisible:
    text: "Sheet"
- assertNotVisible:
    text: "Close"
- tapOn:
    id: "open_bottom_sheet"
- assertVisible:
    text: "Sheet"
- assertVisible:
    text: "Close"
- tapOn:
    text: "Close"
- assertNotVisible:
    text: "Sheet"
- assertNotVisible:
    text: "Close"
